services:
  - type: web
    name: stock-trend-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:server
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.9
      - key: HOST
        value: 0.0.0.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PRICE_ALLOW_INSECURE_SSL
        value: "true"
